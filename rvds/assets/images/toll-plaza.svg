<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b2545"/>
      <stop offset="55%" stop-color="#13315c"/>
      <stop offset="100%" stop-color="#1f4068"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <linearGradient id="canopyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c4a85"/>
      <stop offset="100%" stop-color="#0d2c52"/>
    </linearGradient>
    <linearGradient id="signGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e62b8"/>
      <stop offset="100%" stop-color="#0f4c92"/>
    </linearGradient>
    <radialGradient id="lightGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff8c4" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ffeb70" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffeb70" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky -->
  <rect width="1200" height="500" fill="url(#skyGrad)"/>

  <!-- distant city silhouette -->
  <g opacity="0.4" fill="#0b1c33">
    <rect x="0"   y="380" width="80"  height="120"/>
    <rect x="60"  y="350" width="60"  height="150"/>
    <rect x="110" y="370" width="80"  height="130"/>
    <rect x="170" y="330" width="50"  height="170"/>
    <rect x="900" y="360" width="70"  height="140"/>
    <rect x="950" y="340" width="60"  height="160"/>
    <rect x="1000" y="370" width="80" height="130"/>
    <rect x="1060" y="350" width="50" height="150"/>
    <rect x="1110" y="370" width="90" height="130"/>
  </g>

  <!-- road -->
  <rect y="500" width="1200" height="200" fill="url(#roadGrad)"/>

  <!-- lane stripes -->
  <g stroke="#f4c33b" stroke-width="3" stroke-dasharray="36 24" opacity="0.6">
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="660" x2="1200" y2="660"/>
  </g>

  <!-- toll plaza canopy -->
  <rect x="100" y="180" width="1000" height="80" fill="url(#canopyGrad)" rx="6"/>
  <rect x="100" y="180" width="1000" height="14" fill="#1f4f8f"/>
  <rect x="100" y="246" width="1000" height="14" fill="#0a234a"/>

  <!-- FASTag sign -->
  <g transform="translate(420 90)">
    <rect width="360" height="84" fill="url(#signGrad)" rx="6" stroke="#3a8de0" stroke-width="2"/>
    <text x="180" y="56" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="44" fill="#fff" letter-spacing="1">FAS<tspan fill="#ff7a00">Tag</tspan></text>
    <!-- wifi waves -->
    <g transform="translate(304 18)" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
      <path d="M0 14 Q6 6 12 14"/>
      <path d="M-4 18 Q6 4 16 18"/>
      <path d="M-8 22 Q6 2 20 22"/>
    </g>
  </g>

  <!-- support pillars -->
  <g fill="#0a1c36">
    <rect x="120"  y="260" width="40" height="280"/>
    <rect x="380"  y="260" width="40" height="280"/>
    <rect x="640"  y="260" width="40" height="280"/>
    <rect x="900"  y="260" width="40" height="280"/>
    <rect x="1140" y="260" width="40" height="280"/>
  </g>

  <!-- traffic signal lights (green for go) -->
  <g>
    <circle cx="270" cy="290" r="6" fill="#33ff77"/>
    <circle cx="270" cy="290" r="14" fill="url(#lightGlow)" opacity="0.6"/>
    <circle cx="540" cy="290" r="6" fill="#ff3333"/>
    <circle cx="540" cy="290" r="14" fill="url(#lightGlow)" opacity="0.4"/>
    <circle cx="800" cy="290" r="6" fill="#33ff77"/>
    <circle cx="800" cy="290" r="14" fill="url(#lightGlow)" opacity="0.6"/>
    <circle cx="1040" cy="290" r="6" fill="#33ff77"/>
    <circle cx="1040" cy="290" r="14" fill="url(#lightGlow)" opacity="0.6"/>
  </g>

  <!-- toll booth bottom -->
  <g fill="#162a47">
    <rect x="160" y="420" width="220" height="120" rx="4"/>
    <rect x="420" y="420" width="220" height="120" rx="4"/>
    <rect x="680" y="420" width="220" height="120" rx="4"/>
    <rect x="940" y="420" width="200" height="120" rx="4"/>
  </g>

  <!-- cars in lanes -->
  <g>
    <!-- car 1 (white sedan) -->
    <g transform="translate(220 560)">
      <rect x="0" y="14" width="140" height="32" rx="6" fill="#e8eef4"/>
      <path d="M20 14 L34 -4 L106 -4 L120 14 Z" fill="#cdd6e0"/>
      <rect x="34" y="-2" width="32" height="14" fill="#1a2a3a" opacity="0.7"/>
      <rect x="74" y="-2" width="32" height="14" fill="#1a2a3a" opacity="0.7"/>
      <circle cx="30" cy="48" r="10" fill="#0a0a0a"/>
      <circle cx="110" cy="48" r="10" fill="#0a0a0a"/>
      <circle cx="6" cy="32" r="3" fill="#fff7c0"/>
    </g>
    <!-- car 2 (silver SUV) -->
    <g transform="translate(490 555)">
      <rect x="0" y="10" width="160" height="40" rx="8" fill="#b8c1ce"/>
      <path d="M22 10 L38 -10 L122 -10 L138 10 Z" fill="#9aa6b6"/>
      <rect x="38" y="-8" width="36" height="18" fill="#1a2a3a" opacity="0.7"/>
      <rect x="82" y="-8" width="36" height="18" fill="#1a2a3a" opacity="0.7"/>
      <circle cx="34" cy="52" r="11" fill="#0a0a0a"/>
      <circle cx="126" cy="52" r="11" fill="#0a0a0a"/>
      <circle cx="6" cy="30" r="3" fill="#fff7c0"/>
    </g>
    <!-- car 3 (red hatchback) -->
    <g transform="translate(770 562)">
      <rect x="0" y="14" width="120" height="30" rx="6" fill="#cf2027"/>
      <path d="M16 14 L30 -2 L94 -2 L106 14 Z" fill="#9b1a20"/>
      <rect x="30" y="0" width="28" height="14" fill="#1a2a3a" opacity="0.7"/>
      <rect x="64" y="0" width="28" height="14" fill="#1a2a3a" opacity="0.7"/>
      <circle cx="26" cy="46" r="9" fill="#0a0a0a"/>
      <circle cx="94" cy="46" r="9" fill="#0a0a0a"/>
      <circle cx="4" cy="30" r="3" fill="#fff7c0"/>
    </g>
    <!-- car 4 (black sedan) -->
    <g transform="translate(1020 560)">
      <rect x="0" y="14" width="140" height="32" rx="6" fill="#1c2937"/>
      <path d="M20 14 L34 -4 L106 -4 L120 14 Z" fill="#0e1620"/>
      <rect x="34" y="-2" width="32" height="14" fill="#3a5878" opacity="0.7"/>
      <rect x="74" y="-2" width="32" height="14" fill="#3a5878" opacity="0.7"/>
      <circle cx="30" cy="48" r="10" fill="#0a0a0a"/>
      <circle cx="110" cy="48" r="10" fill="#0a0a0a"/>
      <circle cx="4" cy="32" r="3" fill="#fff7c0"/>
    </g>
  </g>

  <!-- ambient lights under canopy -->
  <g opacity="0.4">
    <ellipse cx="240" cy="265" rx="120" ry="6" fill="#ffeb70"/>
    <ellipse cx="510" cy="265" rx="120" ry="6" fill="#ffeb70"/>
    <ellipse cx="770" cy="265" rx="120" ry="6" fill="#ffeb70"/>
    <ellipse cx="1040" cy="265" rx="120" ry="6" fill="#ffeb70"/>
  </g>
</svg>
