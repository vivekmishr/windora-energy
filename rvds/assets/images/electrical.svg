<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="elBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#13315c"/>
      <stop offset="100%" stop-color="#0b2545"/>
    </linearGradient>
    <linearGradient id="panelBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4452"/>
      <stop offset="100%" stop-color="#1c2530"/>
    </linearGradient>
    <radialGradient id="sparkGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffe066" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#elBg)"/>

  <!-- Industrial floor -->
  <rect y="540" width="1200" height="160" fill="#0a1730"/>
  <line x1="0" y1="545" x2="1200" y2="545" stroke="#1e62b8" stroke-width="2" opacity="0.5"/>
  <g stroke="#1e62b8" stroke-width="1" opacity="0.2">
    <line x1="100" y1="545" x2="100" y2="700"/>
    <line x1="300" y1="545" x2="300" y2="700"/>
    <line x1="500" y1="545" x2="500" y2="700"/>
    <line x1="700" y1="545" x2="700" y2="700"/>
    <line x1="900" y1="545" x2="900" y2="700"/>
    <line x1="1100" y1="545" x2="1100" y2="700"/>
  </g>

  <!-- Cable tray on ceiling -->
  <rect x="0" y="60" width="1200" height="20" fill="#2a3340"/>
  <g fill="#ff7a00"><rect x="0" y="68" width="1200" height="2"/></g>
  <g fill="#1bbf8a"><rect x="0" y="73" width="1200" height="2"/></g>
  <g fill="#cf2027"><rect x="0" y="78" width="1200" height="2"/></g>

  <!-- Cable drops -->
  <g stroke="#ff7a00" stroke-width="3" fill="none" opacity="0.85">
    <path d="M180 80 Q180 140 220 200"/>
    <path d="M600 80 Q600 140 600 200"/>
    <path d="M980 80 Q980 140 940 200"/>
  </g>

  <!-- HT Panel (left) -->
  <g transform="translate(120 200)">
    <rect width="220" height="340" fill="url(#panelBody)" rx="6" stroke="#5d6976" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="40" fill="#0a1018"/>
    <text x="110" y="26" text-anchor="middle" font-family="Arial Black" font-size="14" fill="#ff7a00">HT PANEL · 11 kV</text>
    <!-- meters -->
    <g>
      <rect x="20" y="60" width="80" height="80" rx="4" fill="#0a1018" stroke="#5d6976"/>
      <circle cx="60" cy="100" r="26" fill="#0a1018" stroke="#1bbf8a" stroke-width="1.5"/>
      <line x1="60" y1="100" x2="76" y2="86" stroke="#ff7a00" stroke-width="2"/>
      <circle cx="60" cy="100" r="3" fill="#ff7a00"/>
      <rect x="120" y="60" width="80" height="80" rx="4" fill="#0a1018" stroke="#5d6976"/>
      <circle cx="160" cy="100" r="26" fill="#0a1018" stroke="#1bbf8a" stroke-width="1.5"/>
      <line x1="160" y1="100" x2="172" y2="84" stroke="#ff7a00" stroke-width="2"/>
      <circle cx="160" cy="100" r="3" fill="#ff7a00"/>
    </g>
    <!-- breakers -->
    <g>
      <rect x="20" y="160" width="180" height="20" rx="3" fill="#5d6976"/>
      <rect x="20" y="190" width="180" height="20" rx="3" fill="#5d6976"/>
      <rect x="20" y="220" width="180" height="20" rx="3" fill="#5d6976"/>
      <rect x="30" y="164" width="14" height="12" fill="#1bbf8a"/>
      <rect x="50" y="164" width="14" height="12" fill="#1bbf8a"/>
      <rect x="70" y="164" width="14" height="12" fill="#cf2027"/>
      <rect x="90" y="164" width="14" height="12" fill="#1bbf8a"/>
      <rect x="110" y="164" width="14" height="12" fill="#1bbf8a"/>
      <rect x="130" y="164" width="14" height="12" fill="#1bbf8a"/>
      <rect x="150" y="164" width="14" height="12" fill="#cf2027"/>
      <rect x="170" y="164" width="14" height="12" fill="#1bbf8a"/>
    </g>
    <!-- indicators -->
    <g>
      <circle cx="40" cy="280" r="6" fill="#1bbf8a"/>
      <circle cx="60" cy="280" r="6" fill="#ffe066"/>
      <circle cx="80" cy="280" r="6" fill="#cf2027"/>
      <text x="120" y="285" font-family="Arial" font-size="12" fill="#aaa">R · Y · B</text>
    </g>
    <text x="110" y="320" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">RVDS · LICENSED CONTRACTOR</text>
  </g>

  <!-- LT Distribution panel (centre) -->
  <g transform="translate(420 200)">
    <rect width="280" height="340" fill="url(#panelBody)" rx="6" stroke="#5d6976" stroke-width="2"/>
    <rect width="280" height="40" fill="#0a1018"/>
    <text x="140" y="26" text-anchor="middle" font-family="Arial Black" font-size="14" fill="#1bbf8a">LT DISTRIBUTION · 415 V</text>
    <!-- digital meter -->
    <g>
      <rect x="30" y="60" width="220" height="80" rx="6" fill="#0a1018" stroke="#1bbf8a" stroke-width="2"/>
      <text x="140" y="90" text-anchor="middle" font-family="Arial Black" font-size="14" fill="#1bbf8a">SMART ENERGY METER</text>
      <text x="140" y="124" text-anchor="middle" font-family="Arial Black" font-size="22" fill="#ffe066">2,476.83 kWh</text>
    </g>
    <!-- MCB rows -->
    <g>
      <rect x="30" y="160" width="220" height="160" rx="3" fill="#1c2530"/>
      <g>
        <rect x="40" y="170" width="14" height="36" fill="#5d6976"/>
        <rect x="58" y="170" width="14" height="36" fill="#5d6976"/>
        <rect x="76" y="170" width="14" height="36" fill="#5d6976"/>
        <rect x="94" y="170" width="14" height="36" fill="#5d6976"/>
        <rect x="112" y="170" width="14" height="36" fill="#5d6976"/>
        <rect x="130" y="170" width="14" height="36" fill="#5d6976"/>
        <rect x="148" y="170" width="14" height="36" fill="#5d6976"/>
        <rect x="166" y="170" width="14" height="36" fill="#5d6976"/>
        <rect x="184" y="170" width="14" height="36" fill="#5d6976"/>
        <rect x="202" y="170" width="14" height="36" fill="#5d6976"/>
        <rect x="220" y="170" width="14" height="36" fill="#5d6976"/>
      </g>
      <g>
        <rect x="40" y="220" width="14" height="36" fill="#5d6976"/>
        <rect x="58" y="220" width="14" height="36" fill="#5d6976"/>
        <rect x="76" y="220" width="14" height="36" fill="#5d6976"/>
        <rect x="94" y="220" width="14" height="36" fill="#5d6976"/>
        <rect x="112" y="220" width="14" height="36" fill="#5d6976"/>
        <rect x="130" y="220" width="14" height="36" fill="#5d6976"/>
        <rect x="148" y="220" width="14" height="36" fill="#5d6976"/>
        <rect x="166" y="220" width="14" height="36" fill="#5d6976"/>
        <rect x="184" y="220" width="14" height="36" fill="#5d6976"/>
        <rect x="202" y="220" width="14" height="36" fill="#5d6976"/>
        <rect x="220" y="220" width="14" height="36" fill="#5d6976"/>
      </g>
      <g>
        <rect x="40" y="270" width="14" height="36" fill="#5d6976"/>
        <rect x="58" y="270" width="14" height="36" fill="#5d6976"/>
        <rect x="76" y="270" width="14" height="36" fill="#5d6976"/>
        <rect x="94" y="270" width="14" height="36" fill="#5d6976"/>
        <rect x="112" y="270" width="14" height="36" fill="#5d6976"/>
        <rect x="130" y="270" width="14" height="36" fill="#5d6976"/>
      </g>
    </g>
  </g>

  <!-- Transformer (right) -->
  <g transform="translate(800 240)">
    <rect width="180" height="300" fill="#3a4452" rx="4" stroke="#5d6976" stroke-width="2"/>
    <rect x="-10" y="40" width="200" height="20" fill="#2c3540"/>
    <rect x="-10" y="240" width="200" height="20" fill="#2c3540"/>
    <!-- coil ridges -->
    <g stroke="#1c2530" stroke-width="2">
      <line x1="0" y1="80" x2="180" y2="80"/>
      <line x1="0" y1="100" x2="180" y2="100"/>
      <line x1="0" y1="120" x2="180" y2="120"/>
      <line x1="0" y1="140" x2="180" y2="140"/>
      <line x1="0" y1="160" x2="180" y2="160"/>
      <line x1="0" y1="180" x2="180" y2="180"/>
      <line x1="0" y1="200" x2="180" y2="200"/>
      <line x1="0" y1="220" x2="180" y2="220"/>
    </g>
    <!-- bushings -->
    <g>
      <rect x="20" y="-20" width="20" height="40" fill="#fff"/>
      <rect x="80" y="-20" width="20" height="40" fill="#fff"/>
      <rect x="140" y="-20" width="20" height="40" fill="#fff"/>
      <ellipse cx="30" cy="-20" rx="14" ry="6" fill="#dde7f0"/>
      <ellipse cx="90" cy="-20" rx="14" ry="6" fill="#dde7f0"/>
      <ellipse cx="150" cy="-20" rx="14" ry="6" fill="#dde7f0"/>
    </g>
    <text x="90" y="280" text-anchor="middle" font-family="Arial Black" font-size="11" fill="#ffe066">TRANSFORMER · 1000 kVA</text>
  </g>

  <!-- Lightning bolt sparks -->
  <g>
    <circle cx="980" cy="200" r="40" fill="url(#sparkGlow)"/>
    <path d="M972 178 L962 208 L976 208 L968 232 L992 198 L976 198 Z" fill="#ffe066"/>
  </g>
  <g>
    <circle cx="430" cy="150" r="30" fill="url(#sparkGlow)" opacity="0.6"/>
    <path d="M424 138 L416 158 L426 158 L420 174 L438 146 L428 146 Z" fill="#ffe066" opacity="0.8"/>
  </g>

  <!-- foreground engineer silhouette -->
  <g transform="translate(1010 360)" opacity="0.85">
    <rect x="0" y="40" width="60" height="120" rx="6" fill="#ff7a00"/>
    <rect x="6" y="46" width="48" height="14" fill="#ffd9b3"/>
    <circle cx="30" cy="20" r="20" fill="#ffd9b3"/>
    <path d="M10 14 Q30 -6 50 14 L50 22 L10 22 Z" fill="#ffe066"/>
  </g>
</svg>
