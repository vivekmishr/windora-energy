<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="meterBgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f223e"/>
      <stop offset="100%" stop-color="#1d3d6e"/>
    </linearGradient>
    <linearGradient id="meterBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#cdd6e0"/>
    </linearGradient>
    <linearGradient id="screenGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c5b3a"/>
      <stop offset="100%" stop-color="#072a1c"/>
    </linearGradient>
    <linearGradient id="dashCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2f8"/>
    </linearGradient>
    <radialGradient id="auraGreen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#1bbf8a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1bbf8a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="700" fill="url(#meterBgGrad)"/>
  <!-- grid pattern -->
  <g stroke="#2b4a78" stroke-width="1" opacity="0.4">
    <g>
      <line x1="0"   y1="100" x2="1200" y2="100"/>
      <line x1="0"   y1="200" x2="1200" y2="200"/>
      <line x1="0"   y1="300" x2="1200" y2="300"/>
      <line x1="0"   y1="400" x2="1200" y2="400"/>
      <line x1="0"   y1="500" x2="1200" y2="500"/>
      <line x1="0"   y1="600" x2="1200" y2="600"/>
    </g>
    <g>
      <line x1="100"  y1="0" x2="100"  y2="700"/>
      <line x1="200"  y1="0" x2="200"  y2="700"/>
      <line x1="300"  y1="0" x2="300"  y2="700"/>
      <line x1="400"  y1="0" x2="400"  y2="700"/>
      <line x1="500"  y1="0" x2="500"  y2="700"/>
      <line x1="600"  y1="0" x2="600"  y2="700"/>
      <line x1="700"  y1="0" x2="700"  y2="700"/>
      <line x1="800"  y1="0" x2="800"  y2="700"/>
      <line x1="900"  y1="0" x2="900"  y2="700"/>
      <line x1="1000" y1="0" x2="1000" y2="700"/>
      <line x1="1100" y1="0" x2="1100" y2="700"/>
    </g>
  </g>

  <!-- aura -->
  <circle cx="380" cy="350" r="280" fill="url(#auraGreen)"/>

  <!-- smart meter -->
  <g transform="translate(180 160)">
    <ellipse cx="200" cy="430" rx="220" ry="14" fill="#000" opacity="0.35"/>
    <!-- body -->
    <rect x="20" y="0" width="360" height="420" rx="22" fill="url(#meterBody)" stroke="#9aa6b4" stroke-width="2"/>
    <!-- top label -->
    <rect x="20" y="0" width="360" height="60" rx="22" fill="#0e1d36"/>
    <rect x="20" y="40" width="360" height="20" fill="#0e1d36"/>
    <text x="200" y="40" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#1bbf8a" letter-spacing="2">RVDS SMART METER</text>
    <text x="200" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7c97c0" letter-spacing="2">MSEDCL COMPLIANT · MODEL EV-200</text>

    <!-- LCD screen -->
    <rect x="50" y="80" width="300" height="120" rx="8" fill="url(#screenGreen)" stroke="#0a3a25" stroke-width="2"/>
    <!-- screen content -->
    <text x="68" y="108" font-family="Courier New, monospace" font-size="14" fill="#9bff9b" font-weight="700">kWh</text>
    <text x="340" y="148" text-anchor="end" font-family="Courier New, monospace" font-size="48" fill="#9bff9b" font-weight="900" letter-spacing="2">2476.83</text>
    <text x="340" y="180" text-anchor="end" font-family="Courier New, monospace" font-size="11" fill="#5dd58f">240V · 50Hz · 16A</text>
    <text x="68" y="180" font-family="Courier New, monospace" font-size="11" fill="#5dd58f">● LIVE</text>

    <!-- bolt indicator -->
    <g transform="translate(60 220)">
      <circle cx="20" cy="20" r="20" fill="#1bbf8a"/>
      <path d="M22 6 L8 26 L18 26 L14 38 L30 18 L20 18 Z" fill="#fff"/>
    </g>
    <text x="110" y="232" font-family="Arial, sans-serif" font-size="13" fill="#0e1d36" font-weight="700">ENERGY DELIVERED</text>
    <text x="110" y="248" font-family="Arial, sans-serif" font-size="11" fill="#6b7889">Updated every 1 second</text>

    <!-- meter buttons / pads -->
    <g>
      <rect x="50"  y="290" width="86" height="50" rx="6" fill="#dee5ee" stroke="#a8b3c1"/>
      <rect x="158" y="290" width="86" height="50" rx="6" fill="#dee5ee" stroke="#a8b3c1"/>
      <rect x="266" y="290" width="86" height="50" rx="6" fill="#dee5ee" stroke="#a8b3c1"/>
      <text x="93"  y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0e1d36" font-weight="700">METRICS</text>
      <text x="201" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0e1d36" font-weight="700">SETTINGS</text>
      <text x="309" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0e1d36" font-weight="700">EXPORT</text>
    </g>

    <!-- LED row -->
    <g>
      <circle cx="80"  cy="370" r="6" fill="#1bbf8a"/>
      <circle cx="80"  cy="370" r="11" fill="#1bbf8a" opacity="0.25"/>
      <text x="100" y="374" font-family="Arial, sans-serif" font-size="10" fill="#0e1d36">ONLINE</text>

      <circle cx="180" cy="370" r="6" fill="#1bbf8a"/>
      <circle cx="180" cy="370" r="11" fill="#1bbf8a" opacity="0.25"/>
      <text x="200" y="374" font-family="Arial, sans-serif" font-size="10" fill="#0e1d36">SYNCED</text>

      <circle cx="280" cy="370" r="6" fill="#ff7a00"/>
      <circle cx="280" cy="370" r="11" fill="#ff7a00" opacity="0.3"/>
      <text x="300" y="374" font-family="Arial, sans-serif" font-size="10" fill="#0e1d36">BILLING</text>
    </g>

    <!-- terminals -->
    <rect x="50" y="394" width="300" height="14" rx="3" fill="#0e1d36"/>
  </g>

  <!-- floating dashboard card 1 -->
  <g transform="translate(640 90)">
    <rect width="380" height="170" rx="18" fill="url(#dashCard)" stroke="#cfd8e3" stroke-width="1"/>
    <text x="24" y="36" font-family="Arial, sans-serif" font-size="13" fill="#6b7889" font-weight="700" letter-spacing="2">MONTHLY USAGE</text>
    <text x="24" y="74" font-family="Arial Black, Arial, sans-serif" font-size="34" fill="#0b2545" font-weight="900">42,580 kWh</text>
    <text x="24" y="96" font-family="Arial, sans-serif" font-size="12" fill="#1bbf8a" font-weight="700">▲ 12.4% vs last month</text>
    <!-- bar chart -->
    <g transform="translate(24 110)">
      <rect x="0"   y="20" width="22" height="36" rx="3" fill="#bcd0e9"/>
      <rect x="34"  y="14" width="22" height="42" rx="3" fill="#bcd0e9"/>
      <rect x="68"  y="6"  width="22" height="50" rx="3" fill="#bcd0e9"/>
      <rect x="102" y="22" width="22" height="34" rx="3" fill="#bcd0e9"/>
      <rect x="136" y="10" width="22" height="46" rx="3" fill="#bcd0e9"/>
      <rect x="170" y="0"  width="22" height="56" rx="3" fill="#1bbf8a"/>
      <rect x="204" y="4"  width="22" height="52" rx="3" fill="#bcd0e9"/>
      <rect x="238" y="18" width="22" height="38" rx="3" fill="#bcd0e9"/>
      <rect x="272" y="2"  width="22" height="54" rx="3" fill="#1bbf8a"/>
      <rect x="306" y="16" width="22" height="40" rx="3" fill="#bcd0e9"/>
    </g>
  </g>

  <!-- floating dashboard card 2 -->
  <g transform="translate(700 290)">
    <rect width="320" height="120" rx="18" fill="url(#dashCard)" stroke="#cfd8e3" stroke-width="1"/>
    <text x="22" y="36" font-family="Arial, sans-serif" font-size="13" fill="#6b7889" font-weight="700" letter-spacing="2">REVENUE TODAY</text>
    <text x="22" y="74" font-family="Arial Black, Arial, sans-serif" font-size="30" fill="#0b2545" font-weight="900">₹ 1,24,560</text>
    <!-- spark line -->
    <polyline points="20,100 50,90 80,94 110,80 140,86 170,72 200,78 230,64 260,70 290,58" fill="none" stroke="#ff7a00" stroke-width="3" stroke-linecap="round"/>
    <circle cx="290" cy="58" r="5" fill="#ff7a00"/>
  </g>

  <!-- floating dashboard card 3 (small) -->
  <g transform="translate(700 440)">
    <rect width="150" height="100" rx="14" fill="url(#dashCard)" stroke="#cfd8e3"/>
    <text x="14" y="30" font-family="Arial, sans-serif" font-size="11" fill="#6b7889" font-weight="700" letter-spacing="2">STATIONS</text>
    <text x="14" y="62" font-family="Arial Black, Arial, sans-serif" font-size="28" fill="#0b2545" font-weight="900">128</text>
    <text x="14" y="84" font-family="Arial, sans-serif" font-size="11" fill="#1bbf8a">● 124 online</text>
  </g>
  <g transform="translate(870 440)">
    <rect width="150" height="100" rx="14" fill="url(#dashCard)" stroke="#cfd8e3"/>
    <text x="14" y="30" font-family="Arial, sans-serif" font-size="11" fill="#6b7889" font-weight="700" letter-spacing="2">UPTIME</text>
    <text x="14" y="62" font-family="Arial Black, Arial, sans-serif" font-size="28" fill="#0b2545" font-weight="900">99.8%</text>
    <text x="14" y="84" font-family="Arial, sans-serif" font-size="11" fill="#6b7889">last 30 days</text>
  </g>

  <!-- connection lines from meter to cards -->
  <g stroke="#1bbf8a" stroke-width="2" stroke-dasharray="4 6" opacity="0.7" fill="none">
    <path d="M540 230 C 600 200, 640 180, 700 175"/>
    <path d="M540 320 C 620 320, 660 340, 720 350"/>
    <path d="M540 410 C 620 460, 680 480, 770 490"/>
  </g>
</svg>
