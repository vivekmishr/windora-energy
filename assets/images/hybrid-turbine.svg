<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="hy-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4d6"/>
      <stop offset="100%" stop-color="#d4edda"/>
    </linearGradient>
    <radialGradient id="hy-sun" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="60%" stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#ff9800"/>
    </radialGradient>
    <linearGradient id="hy-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1d3a"/>
    </linearGradient>
    <linearGradient id="hy-blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2D9A4B"/>
    </linearGradient>
    <linearGradient id="hy-pole" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b7685"/>
      <stop offset="50%" stop-color="#d0d4dc"/>
      <stop offset="100%" stop-color="#6b7685"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="150" cy="200" r="150" fill="url(#hy-sky)" opacity="0.6"/>

  <!-- Sun -->
  <circle cx="80" cy="80" r="28" fill="url(#hy-sun)"/>
  <g stroke="#ffc107" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <line x1="80" y1="32" x2="80" y2="44"/>
    <line x1="80" y1="116" x2="80" y2="128"/>
    <line x1="32" y1="80" x2="44" y2="80"/>
    <line x1="116" y1="80" x2="128" y2="80"/>
    <line x1="46" y1="46" x2="54" y2="54"/>
    <line x1="106" y1="106" x2="114" y2="114"/>
    <line x1="114" y1="46" x2="106" y2="54"/>
    <line x1="54" y1="106" x2="46" y2="114"/>
  </g>

  <!-- Solar panel mount legs -->
  <rect x="70" y="290" width="6" height="60" fill="#5a6578" rx="1"/>
  <rect x="145" y="290" width="6" height="60" fill="#5a6578" rx="1"/>

  <!-- Tilted solar panel -->
  <g transform="translate(108 280) rotate(-18)">
    <rect x="-75" y="-18" width="150" height="36" fill="url(#hy-panel)" rx="3"/>
    <!-- Panel grid lines -->
    <g stroke="#3a5a85" stroke-width="0.6" opacity="0.9">
      <line x1="-75" y1="-6" x2="75" y2="-6"/>
      <line x1="-75" y1="6" x2="75" y2="6"/>
      <line x1="-50" y1="-18" x2="-50" y2="18"/>
      <line x1="-25" y1="-18" x2="-25" y2="18"/>
      <line x1="0" y1="-18" x2="0" y2="18"/>
      <line x1="25" y1="-18" x2="25" y2="18"/>
      <line x1="50" y1="-18" x2="50" y2="18"/>
    </g>
    <!-- Panel highlight -->
    <rect x="-75" y="-18" width="150" height="6" fill="white" opacity="0.15" rx="3"/>
  </g>

  <!-- Ground -->
  <ellipse cx="150" cy="370" rx="120" ry="8" fill="#8a95a5" opacity="0.25"/>

  <!-- Wind turbine mast (tall, to the right) -->
  <rect x="218" y="140" width="6" height="215" fill="url(#hy-pole)" rx="1"/>

  <!-- Base for turbine -->
  <ellipse cx="221" cy="358" rx="20" ry="5" fill="#5a6578"/>

  <!-- Turbine hub top -->
  <circle cx="221" cy="142" r="6" fill="#2a3a4a"/>

  <!-- Three helical blades on turbine -->
  <g>
    <path d="M 221 148
             C 200 180, 240 210, 215 245
             C 190 280, 240 305, 221 340"
          stroke="url(#hy-blade)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 221 148
             C 240 180, 200 210, 225 245
             C 250 280, 200 305, 221 340"
          stroke="url(#hy-blade)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M 221 148
             L 221 340"
          stroke="#0A2540" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Connection cable between panel & turbine (subtle) -->
  <path d="M 165 290 Q 195 310 218 295" stroke="#2D9A4B" stroke-width="2" fill="none" stroke-dasharray="4 4" opacity="0.55"/>

  <!-- Wind swoosh -->
  <g stroke="#2196F3" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5">
    <path d="M 245 200 Q 260 195 275 200"/>
    <path d="M 250 230 Q 265 225 280 230"/>
  </g>
</svg>
