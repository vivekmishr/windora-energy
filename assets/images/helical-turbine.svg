<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="h-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#d4edda"/>
    </linearGradient>
    <linearGradient id="h-blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="50%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#2D9A4B"/>
    </linearGradient>
    <linearGradient id="h-blade-back" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="h-pole" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b7685"/>
      <stop offset="50%" stop-color="#d0d4dc"/>
      <stop offset="100%" stop-color="#6b7685"/>
    </linearGradient>
    <filter id="h-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background subtle circle -->
  <circle cx="150" cy="200" r="150" fill="url(#h-sky)" opacity="0.6"/>

  <!-- Base platform -->
  <ellipse cx="150" cy="365" rx="55" ry="10" fill="#8a95a5" opacity="0.4"/>
  <ellipse cx="150" cy="362" rx="45" ry="8" fill="#5a6578"/>

  <!-- Mast/pole -->
  <rect x="146" y="95" width="8" height="270" fill="url(#h-pole)" rx="2"/>

  <!-- Top cap / rotor hub -->
  <circle cx="150" cy="98" r="8" fill="#2a3a4a"/>
  <circle cx="150" cy="98" r="4" fill="#5a6b7e"/>

  <!-- Helical blades (3) — twisted ribbons going from top to bottom -->
  <g filter="url(#h-shadow)">
    <!-- Back blade (recedes) -->
    <path d="M 150 105
             C 110 150, 195 195, 145 240
             C 95 285, 190 315, 150 355"
          stroke="url(#h-blade-back)" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.75"/>

    <!-- Middle blade (front, rotated 120°) -->
    <path d="M 150 105
             C 195 150, 110 195, 160 240
             C 210 285, 115 315, 150 355"
          stroke="url(#h-blade)" stroke-width="11" fill="none" stroke-linecap="round"/>

    <!-- Front blade (rotated 240°, offset) -->
    <path d="M 150 105
             C 150 150, 150 190, 120 240
             C 90 290, 180 315, 150 355"
          stroke="url(#h-blade)" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Motion lines (suggesting rotation) -->
  <g stroke="#2196F3" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45">
    <path d="M 70 180 Q 80 175 90 180"/>
    <path d="M 210 170 Q 220 165 230 170"/>
    <path d="M 65 260 Q 75 255 85 260"/>
    <path d="M 215 270 Q 225 265 235 270"/>
  </g>

  <!-- Mid bracket bands -->
  <ellipse cx="150" cy="180" rx="2.5" ry="8" fill="#2a3a4a" opacity="0.6"/>
  <ellipse cx="150" cy="280" rx="2.5" ry="8" fill="#2a3a4a" opacity="0.6"/>
</svg>
