<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="t-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#d4edda"/>
    </linearGradient>
    <linearGradient id="t-petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="50%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2D9A4B"/>
    </linearGradient>
    <linearGradient id="t-petal-back" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1e35"/>
      <stop offset="100%" stop-color="#143955"/>
    </linearGradient>
    <linearGradient id="t-pole" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b7685"/>
      <stop offset="50%" stop-color="#d0d4dc"/>
      <stop offset="100%" stop-color="#6b7685"/>
    </linearGradient>
    <filter id="t-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background soft circle -->
  <circle cx="150" cy="200" r="150" fill="url(#t-sky)" opacity="0.6"/>

  <!-- Base platform -->
  <ellipse cx="150" cy="370" rx="55" ry="10" fill="#8a95a5" opacity="0.4"/>
  <ellipse cx="150" cy="367" rx="45" ry="8" fill="#5a6578"/>

  <!-- Mast (shorter portion - tulip sits high) -->
  <rect x="146" y="260" width="8" height="107" fill="url(#t-pole)" rx="2"/>

  <!-- Bottom hub where petals converge -->
  <ellipse cx="150" cy="260" rx="14" ry="6" fill="#1a3a5c"/>
  <ellipse cx="150" cy="258" rx="12" ry="5" fill="#2a4e72"/>

  <!-- Top hub -->
  <ellipse cx="150" cy="85" rx="10" ry="5" fill="#1a3a5c"/>

  <!-- Tulip petals — 4 curved blades in 3D perspective -->
  <g filter="url(#t-shadow)">
    <!-- Back petal (thin — viewed edge-on) -->
    <path d="M 150 85
             Q 148 170 150 260"
          stroke="url(#t-petal-back)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- Left petal — wide tulip curve -->
    <path d="M 150 85
             C 90 110, 70 180, 85 230
             Q 105 265 150 260 Z"
          fill="url(#t-petal)" opacity="0.92"/>

    <!-- Right petal — mirror tulip curve -->
    <path d="M 150 85
             C 210 110, 230 180, 215 230
             Q 195 265 150 260 Z"
          fill="url(#t-petal)"/>

    <!-- Front center petal (narrower, closer to viewer) -->
    <path d="M 150 85
             C 130 110, 120 190, 135 240
             Q 145 262 150 260
             Q 155 262 165 240
             C 180 190, 170 110, 150 85 Z"
          fill="url(#t-petal-back)" opacity="0.85"/>
  </g>

  <!-- Highlight curves on petals to show twist -->
  <g fill="none" stroke="#4a7ca3" stroke-width="1.5" opacity="0.4" stroke-linecap="round">
    <path d="M 110 120 Q 95 190 105 240"/>
    <path d="M 190 120 Q 205 190 195 240"/>
  </g>

  <!-- Leaf hint at base (branding) -->
  <path d="M 115 355 Q 140 340 160 360 Q 145 370 115 355 Z" fill="#2D9A4B" opacity="0.5"/>
  <path d="M 185 355 Q 160 340 140 360 Q 155 370 185 355 Z" fill="#3bc061" opacity="0.4"/>

  <!-- Motion lines -->
  <g stroke="#2196F3" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4">
    <path d="M 50 170 Q 62 165 74 170"/>
    <path d="M 226 175 Q 238 170 250 175"/>
    <path d="M 55 220 Q 67 215 79 220"/>
  </g>
</svg>
